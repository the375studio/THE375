<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 — THE375</title>
    <style>
      :root {
        --bg: #f5f5f3;
        --text: #000000;
        --accent: #ff5000;
        --secondary: #cccccc;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        min-height: 100vh;
        padding: 36px 15px;
        background: var(--text);
        color: var(--bg);
        font-family: "Suisse Intl", "Helvetica Neue", Arial, sans-serif;
      }

      main {
        align-self: center;
        width: min(100%, 1100px);
        margin: 0 auto;
      }

      .code {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 32px;
        line-height: 1;
      }

      h1 {
        max-width: 1060px;
        margin: 0;
        font-size: clamp(58px, 8.6vw, 124px);
        font-weight: 400;
        line-height: 0.9;
      }

      .lives {
        display: flex;
        gap: 18px;
        margin-top: 34px;
        color: var(--accent);
        font-size: 56px;
        line-height: 1;
      }

      .life-lost {
        color: var(--secondary);
      }

      p {
        margin: 30px 0 0;
        color: var(--secondary);
        font-size: 32px;
        line-height: 1;
      }

      a {
        display: inline-block;
        margin-top: 42px;
        border: 1px solid var(--bg);
        padding: 14px 18px;
        color: var(--bg);
        font-size: 20px;
        line-height: 1;
        text-decoration: none;
      }

      a:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      @media (max-width: 920px) {
        body {
          padding: 24px 12px;
        }

        main {
          align-self: start;
          padding-top: 168px;
        }

        h1 {
          font-size: clamp(48px, 14vw, 72px);
        }

        .code {
          font-size: 30px;
        }

        .lives {
          gap: 12px;
          margin-top: 28px;
          font-size: 48px;
        }

        p {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="code">404</p>
      <h1>YOU BROKE ALL RELATIONS.</h1>
      <div class="lives" aria-label="One life lost, two lives left">
        <span class="life-lost" aria-hidden="true">♡</span>
        <span aria-hidden="true">♥</span>
        <span aria-hidden="true">♥</span>
      </div>
      <p>One life is gone. Two are still blinking.</p>
      <a href="index.html#home">Return and try again</a>
    </main>
  </body>
</html>
